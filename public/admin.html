<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>لوحة التحكم — درب التبانة الجامعي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#2563ff; --blue-2:#1e40af; --blue-soft:#eaf0ff;
  --navy:#0b1437; --ink:#1a1f36; --muted:#8b90a3;
  --bg:#f4f6fb; --card:#ffffff; --line:#eef0f6;
  --green:#22c55e; --green-soft:#e7f8ee; --orange:#f59e0b; --orange-soft:#fef3e2;
  --red:#ef4444; --red-soft:#fee2e2; --purple:#7c5fd0; --purple-soft:#f0ebfb;
  --shadow:0 4px 20px rgba(60,80,160,.06); --shadow-lg:0 12px 40px rgba(60,80,160,.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}

/* ═══ شاشة الدخول ═══ */
#login{position:fixed;inset:0;display:grid;place-items:center;background:linear-gradient(135deg,#0b1437,#1e3a8a);z-index:100;padding:20px}
.login-box{background:#fff;border-radius:28px;padding:44px 36px;max-width:400px;width:100%;box-shadow:var(--shadow-lg);text-align:center}
.login-box .logo{width:88px;height:88px;margin:0 auto 18px;display:block}
.login-box h1{font-size:22px;font-weight:900;margin-bottom:4px}
.login-box .sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.field{text-align:right;margin-bottom:16px}
.field label{font-size:13px;font-weight:700;display:block;margin-bottom:7px}
.field input,.field select,.field textarea{width:100%;background:var(--bg);border:1.5px solid var(--line);
  border-radius:14px;padding:13px 15px;font-size:14px;font-weight:600;transition:.2s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue);background:#fff}
.btn{background:var(--blue);color:#fff;border:none;border-radius:14px;padding:14px;font-size:15px;
  font-weight:700;width:100%;transition:.2s;box-shadow:0 8px 20px rgba(37,99,255,.28)}
.btn:active{transform:scale(.98)} .btn:disabled{opacity:.6}
.btn.sm{width:auto;padding:9px 16px;font-size:13px;box-shadow:none}
.btn.ghost{background:var(--blue-soft);color:var(--blue);box-shadow:none}
.btn.danger{background:var(--red-soft);color:var(--red);box-shadow:none}
.btn.green{background:var(--green);box-shadow:0 8px 20px rgba(34,197,94,.28)}
.login-err{background:var(--red-soft);color:var(--red);font-size:13px;font-weight:600;
  padding:11px;border-radius:12px;margin-bottom:16px;display:none}

/* ═══ التخطيط الرئيسي ═══ */
#app{display:none;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid var(--line);padding:0 24px;height:66px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.topbar .brand{display:flex;align-items:center;gap:12px}
.topbar .brand img{width:40px;height:40px}
.topbar .brand b{font-size:17px;font-weight:900}
.topbar .brand span{font-size:11px;color:var(--blue);font-weight:700;display:block;margin-top:-2px}
.topbar .right{display:flex;align-items:center;gap:14px}
.topbar .who{font-size:13px;color:var(--muted);font-weight:600}

.layout{display:flex;min-height:calc(100vh - 66px)}
.side{width:230px;background:#fff;border-left:1px solid var(--line);padding:18px 12px;flex:none;
  position:sticky;top:66px;height:calc(100vh - 66px);overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;
  font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;transition:.18s;margin-bottom:4px}
.nav-item:hover{background:var(--bg)}
.nav-item.on{background:var(--blue-soft);color:var(--blue)}
.nav-item svg{width:20px;height:20px;flex:none}
.main{flex:1;padding:28px;max-width:1400px;margin:0 auto;width:100%}
.page-title{font-size:24px;font-weight:900;margin-bottom:6px}
.page-sub{font-size:14px;color:var(--muted);margin-bottom:24px}

/* ═══ الإحصائيات ═══ */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:#fff;border-radius:20px;padding:22px;box-shadow:var(--shadow);border:1px solid var(--line);position:relative;overflow:hidden}
.stat-card .ic{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;margin-bottom:14px}
.stat-card .ic svg{width:22px;height:22px}
.stat-card b{font-size:30px;font-weight:900;display:block;line-height:1}
.stat-card span{font-size:13px;color:var(--muted);font-weight:600}
.stat-card .orb{position:absolute;width:100px;height:100px;border-radius:50%;top:-30px;left:-20px;opacity:.06}
.chart-card{background:#fff;border-radius:20px;padding:24px;box-shadow:var(--shadow);border:1px solid var(--line);margin-bottom:24px}
.chart-card h3{font-size:16px;font-weight:800;margin-bottom:20px}
.chart{display:flex;align-items:flex-end;gap:6px;height:180px}
.chart .bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%}
.chart .bar{width:100%;max-width:32px;background:linear-gradient(180deg,var(--blue),#6d8bff);
  border-radius:6px 6px 0 0;margin-top:auto;transition:height .5s;min-height:3px;position:relative}
.chart .bar:hover::after{content:attr(data-v);position:absolute;top:-24px;left:50%;transform:translateX(-50%);
  background:var(--navy);color:#fff;font-size:11px;font-weight:700;padding:3px 7px;border-radius:6px;white-space:nowrap}
.chart .bar-label{font-size:9px;color:var(--muted);font-weight:600}

/* ═══ الجداول والبطاقات ═══ */
.toolbar{display:flex;gap:12px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.toolbar .search{flex:1;min-width:200px;position:relative}
.toolbar .search input{width:100%;background:#fff;border:1.5px solid var(--line);border-radius:14px;
  padding:12px 16px;font-size:14px;font-weight:600}
.toolbar select{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:12px 14px;font-size:13px;font-weight:700}
.data-card{background:#fff;border-radius:16px;padding:16px 18px;box-shadow:var(--shadow);border:1px solid var(--line);
  margin-bottom:10px;display:flex;align-items:center;gap:14px}
.data-card .dc-main{flex:1;min-width:0}
.data-card .dc-main b{font-size:15px;font-weight:800;display:block}
.data-card .dc-main span{font-size:12.5px;color:var(--muted);font-weight:600}
.data-card .dc-badge{font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;white-space:nowrap}
.badge-gov{background:var(--blue-soft);color:var(--blue)}
.badge-priv{background:var(--orange-soft);color:var(--orange)}
.badge-sci{background:var(--green-soft);color:#16a34a}
.badge-lit{background:var(--orange-soft);color:var(--orange)}
.badge-art{background:var(--purple-soft);color:var(--purple)}
.data-card .dc-actions{display:flex;gap:8px;flex:none}
.icon-btn{width:36px;height:36px;border-radius:11px;border:none;display:grid;place-items:center;transition:.18s}
.icon-btn svg{width:17px;height:17px}
.icon-btn.edit{background:var(--blue-soft);color:var(--blue)}
.icon-btn.del{background:var(--red-soft);color:var(--red)}
.icon-btn.drag{background:var(--bg);color:var(--muted);cursor:grab}
.icon-btn:active{transform:scale(.9)}
.count-info{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:14px}

/* ═══ النافذة المنبثقة ═══ */
.modal-bg{position:fixed;inset:0;background:rgba(11,20,55,.5);backdrop-filter:blur(4px);z-index:80;
  display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.on{display:flex}
.modal{background:#fff;border-radius:24px;padding:28px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal h3{font-size:19px;font-weight:900;margin-bottom:20px}
.modal .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.modal-actions{display:flex;gap:10px;margin-top:22px}
.modal-actions .btn{flex:1}

/* حالات */
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty svg{width:56px;height:56px;margin-bottom:14px;opacity:.4}
.loading{text-align:center;padding:40px;color:var(--muted);font-weight:600}
.spin{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--blue);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);
  background:var(--navy);color:#fff;padding:14px 24px;border-radius:14px;font-weight:700;font-size:14px;
  z-index:200;transition:.3s;box-shadow:var(--shadow-lg)}
.toast.on{transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red)}

@media(max-width:820px){
  .side{position:fixed;right:-240px;top:66px;z-index:50;transition:.25s;box-shadow:var(--shadow-lg)}
  .side.open{right:0}
  .menu-btn{display:grid !important}
  .main{padding:18px}
}
.menu-btn{display:none;width:40px;height:40px;border-radius:12px;background:var(--bg);border:none;place-items:center}
.menu-btn svg{width:22px;height:22px}
</style>
</head>
<body>

<!-- ═══ شاشة الدخول ═══ -->
<div id="login">
  <div class="login-box">
    <img class="logo" id="loginLogo" alt="درب التبانة">
    <h1>لوحة التحكم</h1>
    <div class="sub">درب التبانة الجامعي</div>
    <div class="login-err" id="loginErr"></div>
    <div class="field"><label>اسم المستخدم</label><input id="username" autocomplete="username" placeholder="admin"></div>
    <div class="field" style="position:relative">
      <label>كلمة المرور</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" style="padding-left:44px;">
      <button type="button" onclick="const p=document.getElementById('password'); p.type=p.type==='password'?'text':'password'" style="position:absolute;left:10px;top:32px;background:none;border:none;color:var(--muted);padding:8px;display:flex;">
        <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="12" r="3"/><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/></svg>
      </button>
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()">تسجيل الدخول</button>
  </div>
</div>

<!-- ═══ التطبيق ═══ -->
<div id="app">
  <div class="topbar">
    <div class="brand">
      <button class="menu-btn" onclick="document.querySelector('.side').classList.toggle('open')">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round"/></svg>
      </button>
      <img id="topLogo" alt="">
      <div><b>درب التبانة</b><span>لوحة التحكم</span></div>
    </div>
    <div class="right">
      <span class="who" id="whoami"></span>
      <button class="btn ghost sm" onclick="logout()">خروج</button>
    </div>
  </div>

  <div class="layout">
    <aside class="side">
      <div class="nav-item on" data-page="stats" onclick="nav('stats')">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 20V4M4 20h16M8 16v-5M12 16V8M16 16v-8" stroke-linecap="round"/></svg>
        الإحصائيات</div>
      <div class="nav-item" data-page="depts" onclick="nav('depts')">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h11" stroke-linecap="round"/></svg>
        الأقسام والمعدلات</div>
      <div class="nav-item" data-page="unis" onclick="nav('unis')">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 21V5a1 1 0 011-1h9a1 1 0 011 1v16M15 21V9h4a1 1 0 011 1v11M7 8h2M7 12h2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        الجامعات</div>
      <div class="nav-item" data-page="priv" onclick="nav('priv')">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 21h18M6 21V8l6-4 6 4v13M10 21v-5h4v5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        الأهلية والأجور</div>
      <div class="nav-item" data-page="news" onclick="nav('news')">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 8h10M7 12h6M7 16h8" stroke-linecap="round"/></svg>
        الأخبار</div>
      <div class="nav-item" data-page="banners" onclick="nav('banners')">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 15l5-4 4 3 3-2 6 4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="8" cy="9" r="1.3"/></svg>
        البنرات والإعلانات</div>
      <div class="nav-item" data-page="settings" onclick="nav('settings')">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M19.1 4.9L17 7M7 17l-2.1 2.1" stroke-linecap="round"/></svg>
        إعدادات الموقع</div>
    </aside>

    <main class="main" id="main"><div class="loading"><div class="spin"></div>جارٍ التحميل...</div></main>
  </div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

const $=s=>document.querySelector(s);
async function api(path,opts={}){
  const r=await fetch(API+path,{
    headers:{'Content-Type':'application/json',...(TOKEN?{Authorization:'Bearer '+TOKEN}:{})},
    ...opts, body:opts.body?JSON.stringify(opts.body):undefined
  });
  if(r.status===401){logout();throw new Error('انتهت الجلسة');}
  const data=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(data.error||'خطأ في الاتصال');
  return data;
}

function toast(msg,isErr){
  const t=$('#toast');t.textContent=msg;t.className='toast on'+(isErr?' err':'');
  setTimeout(()=>t.className='toast',2600);
}

// ═══ تسجيل الدخول ═══
async function doLogin(){
  const username=$('#username').value.trim(), password=$('#password').value;
  const btn=$('#loginBtn'), err=$('#loginErr');
  err.style.display='none';
  if(!username||!password){err.textContent='أدخل اسم المستخدم وكلمة المرور';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='جارٍ الدخول...';
  try{
    const res=await fetch(API+'/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username,password})});
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'فشل الدخول');
    TOKEN=data.token;localStorage.setItem('darb_admin_token',TOKEN);
    $('#whoami').textContent=data.user.display_name||data.user.username;
    showApp();
  }catch(e){err.textContent=e.message;err.style.display='block';}
  finally{btn.disabled=false;btn.textContent='تسجيل الدخول';}
}
$('#password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function logout(){
  TOKEN='';localStorage.removeItem('darb_admin_token');
  $('#app').style.display='none';$('#login').style.display='grid';
}
function showApp(){
  $('#login').style.display='none';$('#app').style.display='block';
  nav('stats');
}

// ═══ التنقّل ═══
let currentPage='stats';
function nav(page){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('on',n.dataset.page===page));
  document.querySelector('.side').classList.remove('open');
  const pages={stats:renderStats,depts:renderDepts,unis:renderUnis,priv:renderPriv,news:renderNews,banners:renderBanners,settings:renderSettings};
  (pages[page]||renderStats)();
}

// التحقق من جلسة سابقة عند الفتح
(async()=>{
  if(TOKEN){
    try{const me=await api('/admin/me');$('#whoami').textContent=me.admin.username;showApp();}
    catch{logout();}
  }
})();

      </div>
      <div class="chart-card">
        <h3>الزيارات — آخر 14 يوماً</h3>
        <div class="chart">
          ${s.daily.map(d=>{const h=Math.round((d.visits/maxV)*100);const dd=new Date(d.day);

              <span class="bar-label">${dd.getDate()}/${dd.getMonth()+1}</span></div>`;}).join('')}
        </div>
      </div>
      <div class="chart-card">
        <h3>المحاكاة — آخر 14 يوماً</h3>
        <div class="chart">
          ${(()=>{const mx=Math.max(...s.daily.map(d=>d.simulations),1);

              return `<div class="bar-wrap"><div class="bar" style="height:${h}%;background:linear-gradient(180deg,#22c55e,#4ade80)" data-v="${d.simulations}"></div>

        </div>

async function saveRate(id, name){

}

let PRIV_UNIS=[], PRIV_DEPTS=[], ALL_COLLEGES=[];
async function renderPriv(){

function renderPrivOrder(){

    <div class="data-card" draggable="true" data-id="${u.id}"

      <button class="icon-btn drag">${ico('drag',17)}</button>

      </div>
    </div>`).join('');
}
let dragIdx=null;
function dragStart(e,i){dragIdx=i;}
function dropU(e,i){e.preventDefault();
  if(dragIdx===null||dragIdx===i)return;
  const item=PRIV_UNIS.splice(dragIdx,1)[0];PRIV_UNIS.splice(i,0,item);dragIdx=null;renderPrivOrder();
}
async function saveOrder(){
  try{await api('/admin/universities/reorder',{method:'POST',body:{order:PRIV_UNIS.map(u=>u.id)}});
    toast('تم حفظ الترتيب');
  }catch(e){toast(e.message,true);}
}

let currentUniId = null;
function renderPrivHierarchy(uniId) {
  currentUniId = uniId;
  const uni = PRIV_UNIS.find(u => u.id === uniId);

    <div class="toolbar">
      <button class="btn green sm" onclick="collegeModal(null, '${uniId}')">${ico('plus',16)} إضافة كلية</button>
      <button class="btn green sm" onclick="deptPrivModal('${uniId}')">${ico('plus',16)} إضافة قسم</button>
    </div>
    <div id="uniHierarchy"></div>
  `;
  renderHierarchyLists(uniId);
}

function renderHierarchyLists(uniId) {
  const cols = ALL_COLLEGES.filter(c => c.university_id === uniId).sort((a,b)=>(a.sort_order||1000) - (b.sort_order||1000));
  const depts = PRIV_DEPTS.filter(d => d.university_id === uniId).sort((a,b)=>(a.sort_order||1000) - (b.sort_order||1000));
  
  let html = '';
  cols.forEach(c => {
    const cDepts = depts.filter(d => d.college_id === c.id);
    html += `
      <div class="chart-card" style="margin-bottom:16px;padding:20px;">
        <div class="toolbar" style="margin-bottom:12px;border-bottom:1px solid var(--line);padding-bottom:12px;">
          <h3 style="margin:0;flex:1">${c.name} <span class="dc-badge badge-gov" style="margin-right:8px;font-size:10px">${c.slug}</span></h3>
          <button class="icon-btn edit" onclick='collegeModal(${JSON.stringify(c)},"${uniId}")'>${ico('edit',17)}</button>
          <button class="icon-btn del" onclick='delCollege(${JSON.stringify(c.id)},${JSON.stringify(c.name)},"${uniId}")'>${ico('trash',17)}</button>
        </div>
        <div class="depts-list" id="depts-${c.id}">
          ${cDepts.map((d,i) => `
            <div class="data-card" draggable="true" data-id="${d.id}" ondragstart="dragDeptStart(event,${i},'${c.id}')" ondragover="event.preventDefault()" ondrop="dropDept(event,${i},'${c.id}')" style="margin-right:24px;padding:10px 14px;box-shadow:none;border-color:var(--blue-soft)">
              <button class="icon-btn drag">${ico('drag',17)}</button>
              <div class="dc-main"><b>${d.name}</b><span>${d.branch} · ${d.last_rate!=null?d.last_rate+'٪':'—'}</span></div>
              <span class="dc-badge badge-priv">${fee(d.annual_fee)}</span>
              <div class="dc-actions">
                <button class="icon-btn edit" onclick='feeModal(${JSON.stringify(d.id)},${JSON.stringify(d.name)},${d.annual_fee||0})' title="تعديل الأجر">${ico('edit',17)}</button>
                <button class="icon-btn edit" style="background:var(--orange-soft);color:var(--orange)" onclick='deptPrivModal("${uniId}",${JSON.stringify(d)})' title="تعديل القسم">${ico('edit',17)}</button>
                <button class="icon-btn del" onclick='delDeptPriv(${JSON.stringify(d.id)},${JSON.stringify(d.name)},"${uniId}")' title="حذف القسم">${ico('trash',17)}</button>
              </div>
            </div>
          `).join('')}
        </div>
        <button class="btn sm ghost" style="margin-top:12px;margin-right:24px;" onclick="saveDeptOrder('${c.id}')">حفظ ترتيب الأقسام للكلية</button>
      </div>
    `;
  });
  $('#uniHierarchy').innerHTML = html || '<div class="empty">${ico("empty",56)}<p>لا توجد كليات، قم بإضافة كلية أولاً</p></div>';
}

let dragDeptIdx = null;
let dragDeptCol = null;
function dragDeptStart(e, i, colId) { dragDeptIdx = i; dragDeptCol = colId; }
function dropDept(e, i, colId) {
  e.preventDefault();
  if (dragDeptIdx === null || dragDeptIdx === i || dragDeptCol !== colId) return;
  const deptsInCol = PRIV_DEPTS.filter(d => d.college_id === colId).sort((a,b)=>(a.sort_order||1000) - (b.sort_order||1000));
  const item = deptsInCol.splice(dragDeptIdx, 1)[0];
  deptsInCol.splice(i, 0, item);
  deptsInCol.forEach((d, index) => { d.sort_order = index; });
  dragDeptIdx = null; dragDeptCol = null;
  renderHierarchyLists(currentUniId);
}
async function saveDeptOrder(colId) {
  const deptsInCol = PRIV_DEPTS.filter(d => d.college_id === colId).sort((a,b)=>(a.sort_order||1000) - (b.sort_order||1000));
  try {
    await api('/admin/departments/reorder', { method: 'POST', body: { order: deptsInCol.map(d => d.id) } });
    toast('تم حفظ ترتيب الأقسام');
  } catch(e) { toast(e.message, true); }
}

function collegeModal(c, uniId) {
  const e = c || {};
  openModal(`
    <h3>${c ? 'تعديل كلية' : 'إضافة كلية'}</h3>
    <div class="field"><label>اسم الكلية</label><input id="cName" value="${e.name||''}" placeholder="مثال: كلية الصيدلة"></div>
    <div class="field"><label>رابط مميز (slug بالانجليزية)</label><input id="cSlug" value="${e.slug||''}" placeholder="مثال: pharmacy"></div>
    <div class="modal-actions">

    </div>
  `);
}
async function saveCollege(id, uniId) {
  const name = $('#cName').value.trim();
  const slug = $('#cSlug').value.trim();
  if(!name || !slug){ toast('أدخل الاسم والـ slug', true); return; }
  const payload = { name, slug, university_id: uniId };
  try {
    if(id) {
      await api('/admin/colleges/'+id, {method:'PATCH', body:payload});
      const c = ALL_COLLEGES.find(x=>x.id===id); if(c) Object.assign(c, payload);
      toast('تم الحفظ');
    } else {
      const nc = await api('/admin/colleges', {method:'POST', body:payload});
      ALL_COLLEGES.push(nc); toast('تمت الإضافة');
    }
    closeModal(); renderHierarchyLists(uniId);
  } catch(e) { toast(e.message, true); }
}
function delCollege(id, name, uniId) {

function deptPrivModal(uniId, d) {
  const cols = ALL_COLLEGES.filter(c => c.university_id === uniId);

    <div class="field"><label>اسم القسم</label><input id="dpName" value="${e.name||''}" placeholder="مثال: طب الأسنان"></div>
    <div class="field"><label>رابط مميز (slug بالانجليزية)</label><input id="dpSlug" value="${e.slug||''}" placeholder="مثال: dentistry"></div>
    <div class="field"><label>الكلية</label>
      <select id="dpCol">
        ${cols.map(c => `<option value="${c.id}" ${e.college_id===c.id?'selected':''}>${c.name}</option>`).join('')}
      </select>
    </div>
    <div class="row2">
      <div class="field"><label>الفرع</label><select id="dpBranch"><option ${e.branch==='علمي'?'selected':''}>علمي</option><option ${e.branch==='أدبي'?'selected':''}>أدبي</option><option ${e.branch==='فنون'?'selected':''}>فنون</option></select></div>
      <div class="field"><label>سنوات الدراسة</label><input type="number" id="dpYears" value="${e.study_years||4}" min="1" max="7"></div>
    </div>
    <div class="row2">
      <div class="field"><label>الحد الأدنى للقبول (٪)</label><input type="number" id="dpRate" placeholder="مثال: 85" step="0.01" value="${e.last_rate!=null?e.last_rate:''}"></div>
      <div class="field"><label>الأجر السنوي (دينار)</label><input type="number" id="dpFee" placeholder="مثال: 8000000" value="${e.annual_fee||''}"></div>
    </div>
    <div class="modal-actions">
      <button class="btn green" onclick='saveDeptPriv(${d?JSON.stringify(d.id):'null'}, "${uniId}")'>${d?'حفظ':'إضافة'}</button>
      <button class="btn ghost" onclick="closeModal()">إلغاء</button>
    </div>
  `);
}
async function saveDeptPriv(id, uniId) {
  const name = $('#dpName').value.trim();
  const slug = $('#dpSlug').value.trim();
  const college_id = $('#dpCol').value;
  const branch = $('#dpBranch').value;
  const study_years = +$('#dpYears').value;
  const min_rate = +$('#dpRate').value || null;
  const annual_fee = +$('#dpFee').value || null;
  if(!name || !slug) { toast('أدخل الاسم والـ slug', true); return; }
  
  const payload = { name, slug, college_id, branch, study_years, study_type: 'أهلي', annual_fee };
  try {
    if(id) {
      await api('/admin/departments/'+id, {method:'PATCH', body:payload});
      if(min_rate) await api('/admin/departments/'+id+'/rate', {method:'PUT', body:{min_rate, year:2025, branch}});
      const d = PRIV_DEPTS.find(x=>x.id===id); 
      if(d) { Object.assign(d, payload); d.last_rate = min_rate; }
      toast('تم الحفظ');
    } else {
      const nd = await api('/admin/departments', {method:'POST', body:payload});
      if(min_rate) await api('/admin/departments/'+nd.id+'/rate', {method:'PUT', body:{min_rate, year:2025, branch}});
      nd.last_rate = min_rate;
      nd.university_id = uniId; 
      PRIV_DEPTS.push(nd);
      toast('تمت الإضافة');
    }
    closeModal(); renderHierarchyLists(uniId);
  } catch(e) { toast(e.message, true); }
}
function delDeptPriv(id, name, uniId) {
  confirmModal(`حذف القسم "${name}"؟`, async()=>{
    try {
      await api('/admin/departments/'+id, {method:'DELETE'});
      PRIV_DEPTS = PRIV_DEPTS.filter(d=>d.id!==id);
      renderHierarchyLists(uniId); toast('تم الحذف');
    } catch(e) { toast(e.message, true); }
  });
}

// ═══════════ 5) الأخبار ═══════════
// ═══════════ 5) الأخبار (CRUD كامل) ═══════════
let ALL_NEWS=[];
const NEWS_CATS={'خبر':['news','var(--orange-soft)','#e8843a'],'موعد':['megaphone','var(--blue-soft)','#3b6eff'],'نصيحة':['bulb','var(--green-soft)','#16a34a']};
async function renderNews(){
  const m=$('#main');
  m.innerHTML='<div class="loading"><div class="spin"></div>جارٍ التحميل...</div>';
  try{
    ALL_NEWS=await api('/news');
    m.innerHTML=`
      <div class="page-title">الأخبار والإعلانات</div>
      <div class="page-sub">تُعرض في قسم "آخر الأخبار" بالصفحة الرئيسية</div>
      <div class="toolbar"><button class="btn green sm" onclick="newsModal()">${ico('plus',16)} خبر جديد</button></div>
      <div id="newsList"></div>`;
    renderNewsList();
  }catch(e){m.innerHTML=`<div class="empty">${ico('empty',56)}<p>${e.message}</p></div>`;}
}
function renderNewsList(){
  $('#newsList').innerHTML=ALL_NEWS.length?ALL_NEWS.map(n=>{
    const[ic,bg,col]=NEWS_CATS[n.category]||NEWS_CATS['خبر'];
    return `<div class="data-card">
      <div class="dc-badge" style="background:${bg};color:${col}">${n.category}</div>
      <div class="dc-main"><b>${n.title}</b><span>${n.body||''}</span></div>
      <div class="dc-actions">
        <button class="icon-btn edit" onclick='newsModal(${JSON.stringify(n)})'>${ico('edit',17)}</button>
        <button class="icon-btn del" onclick='delNews(${JSON.stringify(n.id)},${JSON.stringify(n.title)})'>${ico('trash',17)}</button>
      </div></div>`;}).join(''):'<div class="empty">'+ico('empty',56)+'<p>لا توجد أخبار — أضف خبراً جديداً</p></div>';
}
function newsModal(n){
  const e=n||{};
  openModal(`
    <h3>${n?'تعديل خبر':'خبر جديد'}</h3>
    <div class="field"><label>التصنيف</label><select id="nCat">
      <option ${e.category==='خبر'?'selected':''}>خبر</option>
      <option ${e.category==='موعد'?'selected':''}>موعد</option>
      <option ${e.category==='نصيحة'?'selected':''}>نصيحة</option></select></div>
    <div class="field"><label>العنوان</label><input id="nTitle" value="${(e.title||'').replace(/"/g,'&quot;')}" placeholder="عنوان الخبر"></div>
    <div class="field"><label>النص</label><textarea id="nBody" rows="3" placeholder="تفاصيل الخبر">${e.body||''}</textarea></div>
    <div class="modal-actions">
      <button class="btn ${n?'':'green'}" onclick='saveNews(${n?JSON.stringify(n.id):'null'})'>${n?'حفظ':'نشر'}</button>
      <button class="btn ghost" onclick="closeModal()">إلغاء</button>
    </div>`);
}
async function saveNews(id){
  const title=$('#nTitle').value.trim();
  if(!title){toast('أدخل عنوان الخبر',true);return;}
  const cat=$('#nCat').value;
  const payload={title,body:$('#nBody').value.trim(),category:cat,icon:(NEWS_CATS[cat]||['news'])[0]};
  try{
    if(id){await api('/admin/news/'+id,{method:'PATCH',body:payload});
      const n=ALL_NEWS.find(x=>x.id===id);if(n)Object.assign(n,payload);toast('تم الحفظ');}
    else{const nn=await api('/admin/news',{method:'POST',body:payload});ALL_NEWS.unshift(nn);toast('تم النشر');}
    closeModal();renderNewsList();
  }catch(e){toast(e.message,true);}
}
function delNews(id,title){
  confirmModal(`حذف الخبر "${title}"؟`,async()=>{
    try{await api('/admin/news/'+id,{method:'DELETE'});
      ALL_NEWS=ALL_NEWS.filter(n=>n.id!==id);renderNewsList();toast('تم الحذف');
    }catch(e){toast(e.message,true);}
  });
}

// ═══════════ 6) البنرات (السلايدر) ═══════════
let ALL_BANNERS=[];
const GRADS={'s1':'أزرق','s2':'أخضر','s3':'برتقالي'};
async function renderBanners(){
  const m=$('#main');
  m.innerHTML='<div class="loading"><div class="spin"></div>جارٍ التحميل...</div>';
  try{
    ALL_BANNERS=await api('/banners');
    m.innerHTML=`
      <div class="page-title">البنرات والإعلانات</div>
      <div class="page-sub">الشرائح المتحركة أعلى الصفحة الرئيسية</div>
      <div class="toolbar"><button class="btn green sm" onclick="bannerModal()">${ico('plus',16)} بنر جديد</button></div>
      <div id="bannerList"></div>`;
    renderBannerList();
  }catch(e){m.innerHTML=`<div class="empty">${ico('empty',56)}<p>${e.message}</p></div>`;}
}
function renderBannerList(){
  $('#bannerList').innerHTML=ALL_BANNERS.length?ALL_BANNERS.map(b=>`
    <div class="data-card">
      <div class="dc-badge badge-gov">${b.tag||GRADS[b.gradient]||'بنر'}</div>
      <div class="dc-main"><b>${b.title}</b><span>${b.subtitle||''}</span></div>
      <div class="dc-actions">
        <button class="icon-btn edit" onclick='bannerModal(${JSON.stringify(b)})'>${ico('edit',17)}</button>
        <button class="icon-btn del" onclick='delBanner(${JSON.stringify(b.id)},${JSON.stringify(b.title)})'>${ico('trash',17)}</button>
      </div></div>`).join(''):'<div class="empty">'+ico('empty',56)+'<p>لا توجد بنرات</p></div>';
}
function bannerModal(b){
  const e=b||{};
  openModal(`
    <h3>${b?'تعديل بنر':'بنر جديد'}</h3>
    <div class="field"><label>العنوان</label><input id="bTitle" value="${(e.title||'').replace(/"/g,'&quot;')}" placeholder="عنوان البنر"></div>
    <div class="field"><label>الوصف</label><input id="bSub" value="${(e.subtitle||'').replace(/"/g,'&quot;')}" placeholder="نص فرعي"></div>
    <div class="row2">
      <div class="field"><label>الوسم</label><input id="bTag" value="${(e.tag||'').replace(/"/g,'&quot;')}" placeholder="موعد مهم"></div>
      <div class="field"><label>اللون</label><select id="bGrad">
        <option value="s1" ${e.gradient==='s1'?'selected':''}>أزرق</option>
        <option value="s2" ${e.gradient==='s2'?'selected':''}>أخضر</option>
        <option value="s3" ${e.gradient==='s3'?'selected':''}>برتقالي</option></select></div>
    </div>
    <div class="field"><label>الأيقونة</label><select id="bIcon">
      <option value="megaphone" ${e.icon==='megaphone'?'selected':''}>إعلان</option>
      <option value="bulb" ${e.icon==='bulb'?'selected':''}>نصيحة</option>
      <option value="news" ${e.icon==='news'?'selected':''}>خبر</option>
      <option value="cap" ${e.icon==='cap'?'selected':''}>تعليم</option></select></div>
    <div class="modal-actions">
      <button class="btn ${b?'':'green'}" onclick='saveBanner(${b?JSON.stringify(b.id):'null'})'>${b?'حفظ':'إضافة'}</button>
      <button class="btn ghost" onclick="closeModal()">إلغاء</button>
    </div>`);
}
async function saveBanner(id){
  const title=$('#bTitle').value.trim();
  if(!title){toast('أدخل عنوان البنر',true);return;}
  const payload={title,subtitle:$('#bSub').value.trim(),tag:$('#bTag').value.trim(),gradient:$('#bGrad').value,icon:$('#bIcon').value};
  try{
    if(id){await api('/admin/banners/'+id,{method:'PATCH',body:payload});
      const b=ALL_BANNERS.find(x=>x.id===id);if(b)Object.assign(b,payload);toast('تم الحفظ');}
    else{const nb=await api('/admin/banners',{method:'POST',body:payload});ALL_BANNERS.push(nb);toast('تمت الإضافة');}
    closeModal();renderBannerList();
  }catch(e){toast(e.message,true);}
}
function delBanner(id,title){
  confirmModal(`حذف البنر "${title}"؟`,async()=>{
    try{await api('/admin/banners/'+id,{method:'DELETE'});
      ALL_BANNERS=ALL_BANNERS.filter(b=>b.id!==id);renderBannerList();toast('تم الحذف');
    }catch(e){toast(e.message,true);}
  });
}

// ═══════════ نافذة منبثقة ═══════════
function openModal(html){$('#modal').innerHTML=html;$('#modalBg').classList.add('on');}
function closeModal(){$('#modalBg').classList.remove('on');}
$('#modalBg').addEventListener('click',e=>{if(e.target.id==='modalBg')closeModal();});
function confirmModal(msg,onYes){
  openModal(`<h3>تأكيد</h3><p style="font-size:14px;color:var(--muted);margin-bottom:8px">${msg}</p>
    <div class="modal-actions"><button class="btn danger" id="confYes">نعم، متأكد</button>
    <button class="btn ghost" onclick="closeModal()">إلغاء</button></div>`);
  $('#confYes').onclick=async()=>{closeModal();await onYes();};
}
