<!DOCTYPE html>
<html lang="ar" dir="rtl"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>تفاصيل القسم — درب التبانة</title>
<link rel="stylesheet" href="/css/app.css">
</head><body>
<script src="/js/common.js"></script>
<script>bootShell('/departments')</script>

<div class="wrap">
  <div class="crumbs" id="crumbs"><a href="/">الرئيسية</a><span>/</span><a href="/departments">الأقسام</a></div>
  <div id="body"><div class="loading"><div class="spin"></div>جارٍ تحميل القسم...</div></div>
</div>

<script>
mountFooter();
const body=$('#body');

function rangeBlock(d){
  if(!d.range) return '';
  const cut=d.last_rate;
  return `<div class="range-box">
    <div class="rt">النطاق المتوقع لهذا العام</div>
    <div class="rv">${d.range.min}٪ — ${d.range.max}٪</div>
    <div class="bar"><i></i></div>
    <div class="rt">آخر قبول رسمي: ${cut}٪ (${d.last_year||''}) — تقدير غير رسمي.</div>
  </div>`;
}
function rateHistory(d){
  const rates=(d.rates||[]).slice().sort((a,b)=>b.year-a.year);
  if(!rates.length) return '<p style="color:var(--dim)">لا توجد معدلات مسجلة بعد.</p>';
  return `<div style="display:flex;gap:12px;flex-wrap:wrap">`+rates.map(r=>`
    <div class="stat"><b>${r.min_rate}٪</b><span>قبول ${r.year} · ${r.branch}</span></div>`).join('')+`</div>`;
}

(async()=>{
  const id=qs('id');
  if(!id){ body.innerHTML='<div class="loading">لم يُحدَّد القسم.</div>'; return; }
  try{
    const d=await api('/department/'.replace('/department','/departments')+id);
    document.title=`${d.name} — درب التبانة`;
    $('#crumbs').insertAdjacentHTML('beforeend',`<span>/</span>${d.name}`);
    body.innerHTML=`
      <div class="hero-panel reveal in">
        <div style="display:flex;justify-content:space-between;align-items:start;gap:20px;flex-wrap:wrap">
          <div>
            <div class="ic" style="width:60px;height:60px;font-size:30px;background:var(--panel-2);border:1px solid var(--line);border-radius:16px;display:grid;place-items:center;margin-bottom:14px">${d.college_icon||'🎓'}</div>
            <h1 class="page-title" style="margin:0">${d.name}</h1>
            <p class="page-sub">${d.university_name||''} · ${d.college_name||''}</p>
          </div>
          <a class="btn btn-ghost" href="/university?slug=${d.university_slug||''}">عن الجامعة ←</a>
        </div>
        <div class="stat-row">
          <div class="stat"><b>${d.study_years}</b><span>سنوات الدراسة</span></div>
          <div class="stat"><b>${d.branch}</b><span>الفرع</span></div>
          <div class="stat"><b>${d.last_rate!=null?d.last_rate+'٪':'—'}</b><span>آخر معدل قبول</span></div>
          <div class="stat"><b>${d.study_type||'حكومي'}</b><span>نوع الدراسة</span></div>
        </div>
      </div>

      <div class="grid g2" style="align-items:start">
        <div>
          ${d.overview?`<div class="info-block reveal in"><h3><span class="b"></span>تعريف القسم</h3><p>${d.overview}</p></div>`:''}
          ${d.what_you_study?`<div class="info-block reveal in"><h3><span class="b"></span>ماذا ستدرس؟</h3><p>${d.what_you_study}</p></div>`:''}
          ${d.career_paths?`<div class="info-block reveal in"><h3><span class="b"></span>فرص العمل</h3><p>${d.career_paths}</p></div>`:''}
          ${d.degree?`<div class="info-block reveal in"><h3><span class="b"></span>الشهادة الممنوحة</h3><p>${d.degree}</p></div>`:''}
        </div>
        <div>
          <div class="info-block reveal in">${rangeBlock(d)}</div>
          <div class="info-block reveal in"><h3><span class="b"></span>معدلات القبول السابقة</h3>${rateHistory(d)}</div>
          ${d.annual_fee?`<div class="info-block reveal in"><h3><span class="b"></span>الرسوم السنوية</h3><p>${d.annual_fee.toLocaleString()} دينار</p></div>`:''}
          <a class="btn btn-primary" style="width:100%;justify-content:center" href="/#sim">أضف للمحاكاة 📝</a>
        </div>
      </div>`;
    revealOnScroll();
  }catch(e){ body.innerHTML=`<div class="loading">تعذّر تحميل القسم: ${e.message}</div>`; }
})();
</script>
</body></html>
